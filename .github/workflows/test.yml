name: Test

on:
  workflow_dispatch:
    inputs:
      components:
        description: 'Codebase map (JSON string: { "src/file.tsx": "content" })'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}:main
    
    steps:
      - name: Inject codebase components
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const components = JSON.parse(context.payload.inputs.components);
            for (const [filepath, content] of Object.entries(components)) {
              const fullPath = path.join(process.cwd(), filepath);
              fs.mkdirSync(path.dirname(fullPath), { recursive: true });
              fs.writeFileSync(fullPath, content);
            }
            
      - name: Run Build
        run: pnpm run build
            
      - name: Run Tests
        run: pnpm test
        
      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tested-components
          path: src/
