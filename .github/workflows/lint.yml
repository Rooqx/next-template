name: Lint

on:
  workflow_dispatch:
    inputs:
      component_code:
        description: 'Code to lint (raw code or JSON map)'
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}:main
      
    steps:
      - name: Inject component code
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            try {
              const components = JSON.parse(context.payload.inputs.component_code);
              for (const [filepath, content] of Object.entries(components)) {
                const fullPath = path.join(process.cwd(), filepath);
                fs.mkdirSync(path.dirname(fullPath), { recursive: true });
                fs.writeFileSync(fullPath, content);
              }
            } catch(e) {
              // Fallback for raw string
              fs.mkdirSync('src', { recursive: true });
              fs.writeFileSync('src/index.tsx', context.payload.inputs.component_code);
            }

      - name: Run ESLint
        run: pnpm lint

      - name: Run Type Check
        run: pnpm tsc --noEmit
