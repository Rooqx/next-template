name: Lint

on:
  workflow_dispatch:
    inputs:
      code_url:
        description: 'URL to the secret Gist containing the codebase map'
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rooqx/next-template:main
      
    steps:
      - name: Download Gist Payload
        run: curl -sL ${{ github.event.inputs.code_url }} > payload.json

      - name: Inject component code
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            try {
              const components = JSON.parse(fs.readFileSync('payload.json', 'utf8'));
              for (const [filepath, content] of Object.entries(components)) {
                const fullPath = path.join(process.cwd(), filepath);
                fs.mkdirSync(path.dirname(fullPath), { recursive: true });
                fs.writeFileSync(fullPath, content);
              }
            } catch(e) {
              // Fallback for raw string
              const content = fs.readFileSync('payload.json', 'utf8');
              fs.mkdirSync('src', { recursive: true });
              fs.writeFileSync('src/index.tsx', content);
            }

      - name: Run ESLint
        run: pnpm lint

      - name: Run Type Check
        run: pnpm tsc --noEmit
